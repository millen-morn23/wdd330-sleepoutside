<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header></header>

    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="/images/banner-sm.jpg 500w, /images/banner.jpg"
          alt="image of a high mountain lake"
        />

        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>

        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="categories">
      <h2>Shop by Category</h2>

      <ul class="product-list">

        <li>
          <a href="/product-listing/index.html?category=tents">
            <img src="/images/noun_Tent_2517.svg" alt="Tents" />
            <h3>Tents</h3>
          </a>
        </li>

        <li>
          <a href="/product-listing/index.html?category=backpacks">
            <img src="/images/noun_Backpack_65884.svg" alt="Backpacks" />
            <h3>Backpacks</h3>
          </a>
        </li>

        <li>
          <a href="/product-listing/index.html?category=sleeping-bags">
            <img src="/images/noun_Backpack_2389275.svg" alt="Sleeping Bags" />
            <h3>Sleeping Bags</h3>
          </a>
        </li>

        <li>
          <a href="/product-listing/index.html?category=hammocks">
            <img src="/images/noun_Hammock_2517.svg" alt="Hammocks" />
            <h3>Hammocks</h3>
          </a>
        </li>

      </ul>
</section>
</main>

<footer></footer>

<script type="module" src="/js/main.js"></script>
</body>
</html>
